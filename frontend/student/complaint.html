<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complaint</title>
    <link rel="stylesheet" href="complaint.css">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>

<body>

    <nav class="navbar">
        <div class="nav-links">
            <a href="dashboard.html">Home</a>
            <a href="#">Attendance</a>
            <a href="complaint.html">Complaint</a>
            <a href="canteen.html">Canteen</a>
            <a href="#">Fees</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
        <div class="logo">Hostel<ez id="ez">-ez</ez>
        </div>
    </nav>

    <div class="complaint-container">
    <div class="complaint-header">
        <h2>Submit a Complaint</span></h2>
        <p>Please fill out the form below. Our maintenance team will address it shortly.</p>
    </div>

    <form class="complaint-form">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Enter your name" required>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" placeholder="e.g. 9876543210" required>
            </div>
            <div class="form-group">
                <label for="room">Room Number</label>
                <input type="text" id="room" placeholder="e.g. 504" required>
            </div>
        </div>

        <div class="form-group">
            <label for="type">Complaint Type</label>
            <select id="type" required>
                <option value="" disabled selected>Select Category</option>
                <option value="electrical">Electrical</option>
                <option value="plumbing">Plumbing</option>
                <option value="carpentry">Carpentry</option>
                <option value="wifi">WiFi / Internet</option>
                <option value="cleaning">Housekeeping</option>
                <option value="other">Other</option>
            </select>
        </div>

        <div class="form-group">
            <label for="description">Complaint Description</label>
            <textarea id="description" rows="4" placeholder="Describe the issue in detail..." required></textarea>
        </div>

        <button type="submit" class="submit-btn">Submit Complaint</button>
    </form>
</div>
</body>
</html>
